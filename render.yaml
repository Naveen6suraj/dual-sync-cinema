services:
  # 1. Node.js API Backend
  - type: web
    name: dualsync-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: apps/api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dualsync-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: dualsync-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 3. Redis Database for WebSockets
  - type: redis
    name: dualsync-redis
    plan: free
    ipAllowList: [] # only allow internal connections

databases:
  # 2. PostgreSQL Database
  - name: dualsync-db
    databaseName: dualsyncdb
    user: dualsyncdb_user
    plan: free
